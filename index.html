<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rạp Phim Mini App VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding-bottom: 75px; 
            overflow-x: hidden;
        }

        /* HEADER & FILTERS */
        .header-top {
            padding: 15px 16px;
            font-size: 18px;
            font-weight: bold;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            color: #e50914;
            text-transform: uppercase;
        }

        /* BANNER */
        .hero {
            position: relative;
            width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, #000, transparent);
        }
        .hero-info { position: relative; z-index: 2; text-align: center; padding-bottom: 20px; }

        /* MOVIE GRID */
        .row-title { margin: 20px 16px 10px; font-size: 16px; font-weight: bold; }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 16px;
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 4px;
        }
        .movie-name {
            font-size: 11px;
            margin-top: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* NAVIGATION */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 60px;
            background: #121212;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #757575;
            font-size: 10px;
            text-decoration: none;
        }
        .nav-item.active { color: #fff; }

        /* SECURITY LOCK */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <!-- MÀN HÌNH KHÓA -->
    <div id="lock-screen">
        <h2 style="color: #e50914;">TRUY CẬP KHÔNG HỢP LỆ</h2>
        <p>Vui lòng mở ứng dụng trực tiếp từ Bot Telegram.</p>
    </div>

    <div id="app-content">
        <!-- TRANG CHỦ -->
        <div id="home" class="page active">
            <div class="header-top">Rạp Phim Mini App VIP</div>
            <div class="hero" id="hero-banner" style="background-image: url('https://img.phimapi.com/upload/poster/bac-si-xu-la.jpg');">
                <div class="hero-info">
                    <button style="background:#fff; border:none; padding:8px 20px; font-weight:bold; border-radius:4px;">▶ Phát</button>
                </div>
            </div>
            <p class="row-title">Phim mới cập nhật</p>
            <div class="movie-grid" id="list-phim"></div>
        </div>

        <!-- TÌM KIẾM -->
        <div id="search" class="page" style="padding:20px;">
            <input type="text" placeholder="Tìm tên phim..." style="width:100%; padding:12px; background:#222; border:none; color:#fff; border-radius:5px;">
            <div id="search-results" class="movie-grid" style="margin-top:20px; padding:0;"></div>
        </div>

        <!-- TÀI KHOẢN -->
        <div id="account" class="page" style="padding:40px 20px; text-align:center;">
            <div style="background:#1a1a1a; padding:30px; border-radius:15px; border:1px solid #e50914;">
                <p style="font-size:12px; color:#aaa;">THỜI GIAN VIP CÒN LẠI</p>
                <h2 id="vip-timer" style="margin:10px 0; color:#fff;">--:--:--</h2>
                <p id="user-display" style="font-size:12px; color:#555;">ID: --</p>
            </div>
        </div>

        <!-- THANH ĐIỀU HƯỚNG -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home', this)">
                <span>🏠</span><span>Trang chủ</span>
            </div>
            <div class="nav-item" onclick="switchTab('search', this)">
                <span>🔍</span><span>Tìm kiếm</span>
            </div>
            <div class="nav-item" onclick="switchTab('account', this)">
                <span>👤</span><span>Tài khoản</span>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;

        // KIỂM TRA BẢO MẬT
        function validateAccess() {
            const isTelegram = tg.platform !== 'unknown' || tg.initData !== "";
            if (!isTelegram) {
                document.getElementById('lock-screen').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            } else {
                tg.expand();
                initApp();
            }
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('user-display').innerText = "ID: " + (urlParams.get('user_id') || "Thành viên VIP");

            // Đếm ngược VIP giả lập
            let seconds = 86400 * 7; 
            setInterval(() => {
                seconds--;
                let d = Math.floor(seconds / 86400);
                let h = Math.floor((seconds % 86400) / 3600);
                let m = Math.floor((seconds % 3600) / 60);
                let s = seconds % 60;
                document.getElementById('vip-timer').innerText = `${d}n ${h}:${m}:${s}`;
            }, 1000);

            // Load phim từ API
            fetch('https://phimapi.com/danh-sach/phim-moi-cap-nhat?page=1')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.items.slice(0, 12).forEach(item => {
                        html += `
                            <div class="movie-card">
                                <img src="${item.thumb_url}">
                                <div class="movie-name">${item.name}</div>
                            </div>`;
                    });
                    document.getElementById('list-phim').innerHTML = html;
                });
        }

        window.onload = validateAccess;
    </script>
</body>
</html>
