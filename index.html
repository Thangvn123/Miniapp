<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rạp Phim Mini App - Bản Sửa Lỗi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #141414; color: white; margin: 0; padding: 15px; }
        h2 { color: #e50914; text-align: center; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #333; background-color: #222; color: white; outline: none; }
        .btn { padding: 12px 20px; background-color: #e50914; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        /* DANH SÁCH PHIM */
        .movie-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .movie-item { background-color: #1f1f1f; border-radius: 10px; overflow: hidden; text-align: center; padding-bottom: 10px; cursor: pointer; }
        .movie-item img { width: 100%; height: 220px; object-fit: cover; }
        .movie-title { font-size: 13px; padding: 8px 5px 0 5px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* GIAO DIỆN CHỌN TẬP */
        #detail-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #141414; z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .detail-info h3 { color: #e50914; margin: 0 0 10px 0; }
        .server-title { color: #00ffcc; font-size: 14px; margin: 15px 0 8px 0; font-weight: bold; }
        .episode-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .episode-btn { background-color: #2a2a2a; color: white; padding: 10px 15px; border-radius: 8px; font-size: 13px; border: 1px solid #444; cursor: pointer; }
        .episode-btn:active { background-color: #e50914; }
        .back-btn { background-color: #333; margin-bottom: 20px; padding: 8px 15px; }

        /* TRÌNH PHÁT VIDEO */
        #player-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        .close-player-btn { position: absolute; top: 15px; right: 15px; background: red; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="main-view">
        <h2>🎬 RẠP PHIM MINI APP</h2>
        <div class="search-box">
            <input type="text" id="keyword" placeholder="Nhập tên phim cần tìm...">
            <button class="btn" onclick="searchMovie()">Tìm</button>
        </div>
        <div class="movie-list" id="result-list"></div>
    </div>

    <div id="detail-view">
        <button class="btn back-btn" onclick="closeDetailView()">🔙 Quay lại</button>
        <div id="movie-info-box"></div>
        <div id="episode-box"></div>
    </div>

    <div id="player-view">
        <button class="close-player-btn" onclick="closePlayerView()">❌ Đóng</button>
        <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if(tg) tg.expand();

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const searchKw = urlParams.get('search');
            if (searchKw) {
                document.getElementById('keyword').value = decodeURIComponent(searchKw);
                searchMovie();
            }
        }

        async function searchMovie() {
            const kw = document.getElementById('keyword').value.trim();
            if(!kw) return;
            document.getElementById('result-list').innerHTML = "<p style='text-align:center; width:100%; grid-column:span 2;'>🔍 Đang tìm kiếm...</p>";
            
            try {
                const res = await fetch(`https://phimapi.com/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=30`);
                const data = await res.json();
                let html = '';
                if(data.status === 'success' && data.data.items.length > 0) {
                    data.data.items.forEach(phim => {
                        // Sửa lỗi link ảnh của API tìm kiếm
                        let imgUrl = phim.thumb_url.startsWith('http') ? phim.thumb_url : `https://img.phimapi.com/${phim.thumb_url}`;
                        html += `
                            <div class="movie-item" onclick="loadMovieDetail('${phim.slug}')">
                                <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150x220?text=No+Poster'">
                                <div class="movie-title">${phim.name}</div>
                            </div>
                        `;
                    });
                } else { html = '<p style="grid-column:span 2; text-align:center;">❌ Không thấy phim!</p>'; }
                document.getElementById('result-list').innerHTML = html;
            } catch (e) { document.getElementById('result-list').innerHTML = '<p style="grid-column:span 2; text-align:center;">⚠️ Lỗi API.</p>'; }
        }

        // HÀM LẤY CHI TIẾT TẬP PHIM - CHẠY ĐỘC LẬP TRÊN WEB
        async function loadMovieDetail(slug) {
            try {
                const res = await fetch(`https://phimapi.com/phim/${slug}`);
                const data = await res.json();
                if(!data || !data.movie) return alert('Lỗi tải phim!');

                const movie = data.movie;
                document.getElementById('movie-info-box').innerHTML = `
                    <div class="detail-info">
                        <h3>${movie.name}</h3>
                        <p>🗓️ Năm: ${movie.year} | Ngôn ngữ: ${movie.lang}</p>
                    </div>
                    <hr style="border: 0.5px solid #222; margin: 15px 0;">
                `;

                let epBoxHtml = '<h4 style="color: #e50914;">🍿 CHỌN TẬP PHIM:</h4>';
                if (data.episodes && data.episodes.length > 0) {
                    data.episodes.forEach(server => {
                        epBoxHtml += `<div class="server-title">🚀 ${server.server_name.toUpperCase()}</div><div class="episode-list">`;
                        server.server_data.forEach(tap => {
                            if(tap.link_m3u8) {
                                // Khi bấm nút tập phim, gọi hàm phát video độc lập ngay trên web
                                epBoxHtml += `<button class="episode-btn" onclick="openPlayerView('${tap.link_m3u8}')">${tap.name}</button>`;
                            }
                        });
                        epBoxHtml += `</div>`;
                    });
                } else { epBoxHtml += '<p>Chưa có tập phim.</p>'; }
                
                document.getElementById('episode-box').innerHTML = epBoxHtml;
                document.getElementById('detail-view').style.display = 'block';
            } catch (e) { alert('Lỗi hệ thống hiển thị tập!'); }
        }

        function openPlayerView(linkVideo) {
            document.getElementById('video-iframe').src = `https://player.phimapi.com/player/?url=${encodeURIComponent(linkVideo)}`;
            document.getElementById('player-view').style.display = 'block';
        }
        function closeDetailView() { document.getElementById('detail-view').style.display = 'none'; }
        function closePlayerView() { document.getElementById('player-view').style.display = 'none'; document.getElementById('video-iframe').src = ''; }
    </script>
</body>
</html>
