<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rạp Phim Mini App VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #141414;
            color: #ffffff;
            margin: 0;
            padding: 15px;
        }
        h2 { color: #e50914; text-align: center; margin: 10px 0 10px 0; }
        
        /* BANNER ĐẾM NGƯỢC VIP THỜI GIAN THỰC */
        .vip-countdown-box {
            background: linear-gradient(135deg, #e50914, #9b050c);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #ffcc00;
            box-shadow: 0 4px 10px rgba(229,9,20,0.4);
        }
        .vip-countdown-box p { margin: 0; font-size: 13px; color: #ffeb3b; font-weight: bold;}
        #countdown-timer { font-size: 16px; color: #ffffff; font-family: monospace; display: block; margin-top: 4px; letter-spacing: 1px; }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1; padding: 12px; border-radius: 25px;
            border: 1px solid #333; background-color: #222;
            color: white; outline: none; font-size: 14px;
        }
        .btn {
            padding: 12px 20px; background-color: #e50914;
            color: white; border: none; border-radius: 25px;
            font-weight: bold; cursor: pointer;
        }
        
        #lock-screen {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background:#141414; z-index:99999; text-align:center; padding-top:120px; box-sizing:border-box;
        }
        .lock-card { background:#1f1f1f; padding:30px; margin:0 20px; border-radius:15px; border:1px solid #e50914; }
        
        .movie-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .movie-item {
            background-color: #1f1f1f; border-radius: 10px;
            overflow: hidden; text-align: center; padding-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer;
        }
        .movie-item img { width: 100%; height: 220px; object-fit: cover; }
        .movie-title {
            font-size: 13px; padding: 8px 5px 0 5px; font-weight: bold;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        #detail-view {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #141414;
            z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .detail-header { display: flex; gap: 15px; margin-bottom: 20px; margin-top: 40px; }
        .detail-header img { width: 110px; height: 160px; object-fit: cover; border-radius: 8px; }
        .detail-info h3 { margin: 0 0 10px 0; color: #e50914; font-size: 18px; }
        .detail-info p { font-size: 13px; color: #bbb; margin: 5px 0; }
        .server-title { color: #00ffcc; font-size: 14px; margin: 15px 0 8px 0; font-weight: bold; }
        
        .episode-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .episode-btn {
            background-color: #2a2a2a; color: white; padding: 10px 18px;
            border-radius: 8px; font-size: 13px; border: 1px solid #444; cursor: pointer;
        }
        .episode-btn:active { background-color: #e50914; border-color: #e50914; }
        .back-btn { background-color: #333; position: absolute; top: 15px; left: 20px; padding: 8px 15px; }

        #player-view {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000; z-index: 9999;
        }
        .close-player-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(229, 9, 20, 0.9); color: white;
            border: none; padding: 8px 15px; border-radius: 20px;
            font-weight: bold; z-index: 10001; cursor: pointer;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-card">
            <h2 style="margin-top:0;">⚠️ TRUY CẬP BỊ TỪ CHỐI</h2>
            <p>Tài khoản VIP chưa kích hoạt hoặc đã hết hạn dùng.</p>
            <p style="color:#bbb; font-size:13px;">Hãy gửi mã Key VIP hợp lệ vào ô chat Bot để tiếp tục.</p>
        </div>
    </div>

    <div id="main-view">
        <h2>🎬 RẠP PHIM MINI APP VIP</h2>
        
        <div class="vip-countdown-box">
            <p>⏱️ THỜI GIAN VIP CÒN LẠI CỦA BẠN:</p>
            <span id="countdown-timer">Đang tính toán thời gian...</span>
        </div>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="Nhập tên phim cần tìm...">
            <button class="btn" onclick="searchMovie()">Tìm</button>
        </div>
        <div class="movie-list" id="result-list"></div>
    </div>

    <div id="detail-view">
        <button class="btn back-btn" onclick="closeDetailView()">🔙 Quay lại</button>
        <div id="movie-info-box"></div>
        <div id="episode-box"></div>
    </div>

    <div id="player-view">
        <button class="close-player-btn" onclick="closePlayerView()">❌ Đóng phim</button>
        <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            const expireStr = urlParams.get('expire'); // Lấy chuỗi định dạng dạng: DD/MM/YYYY HH:MM:SS
            
            if (!userId || !expireStr) {
                hienThiManHinhKhoa();
                return;
            }

            // Chạy tính năng đếm lùi thời gian thực
            khoiChayDemNguoc(decodeURIComponent(expireStr));

            const searchKw = urlParams.get('search');
            if (searchKw) {
                document.getElementById('keyword').value = decodeURIComponent(searchKw);
                searchMovie();
            }
        }

        // --- HÀM TÍNH TOÁN VÀ ĐẾM LÙI THEO TỪNG GIÂY ---
        function khoiChayDemNguoc(targetDateStr) {
            // targetDateStr có cấu trúc dạng: "31/12/2026 18:30:00" -> cần bóc tách để tạo Date Object chuẩn Javascript
            const parts = targetDateStr.split(" ");
            const dateParts = parts[0].split("/");
            const timeParts = parts[1].split(":");
            
            // Định dạng New Date: (Year, MonthIndex(0-11), Day, Hour, Minute, Second)
            const targetDate = new Date(dateParts[2], dateParts[1] - 1, dateParts[0], timeParts[0], timeParts[1], timeParts[2]).getTime();

            const timerInterval = setInterval(function() {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    clearInterval(timerInterval);
                    document.getElementById("countdown-timer").innerHTML = "ĐÃ HẾT HẠN GÓI VIP!";
                    hienThiManHinhKhoa();
                    return;
                }

                // Tính toán Ngày, Giờ, Phút, Giây còn lại
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // Hiển thị trực quan ra màn hình
                document.getElementById("countdown-timer").innerHTML = 
                    `${days} ngày, ${hours.toString().padStart(2, '0')} giờ, ${minutes.toString().padStart(2, '0')} phút, ${seconds.toString().padStart(2, '0')} giây`;
            }, 1000); // 1000ms = 1 giây chạy lại một lần
        }

        function hienThiManHinhKhoa() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'block';
        }

        async function searchMovie() {
            const kw = document.getElementById('keyword').value.trim();
            if(!kw) return;
            document.getElementById('result-list').innerHTML = "<p style='grid-column: span 2; text-align:center;'>🔍 Đang tìm kiếm kho phim...</p>";
            try {
                const res = await fetch(`https://phimapi.com/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=30`);
                const data = await res.json();
                let html = '';
                if(data.status === 'success' && data.data.items && data.data.items.length > 0) {
                    data.data.items.forEach(phim => {
                        html += `
                            <div class="movie-item" onclick="loadMovieDetail('${phim.slug}')">
                                <img src="https://img.phimapi.com/${phim.thumb_url}" onerror="this.src='https://via.placeholder.com/150x220?text=No+Poster'">
                                <div class="movie-title">${phim.name}</div>
                            </div>
                        `;
                    });
                } else {
                    html = '<p style="grid-column: span 2; text-align:center;">❌ Không tìm thấy phim phù hợp!</p>';
                }
                document.getElementById('result-list').innerHTML = html;
            } catch (e) {
                document.getElementById('result-list').innerHTML = '<p style="grid-column: span 2; text-align:center;">⚠️ Lỗi kết nối hệ thống.</p>';
            }
        }

        async function loadMovieDetail(slug) {
            try {
                const res = await fetch(`https://phimapi.com/phim/${slug}`);
                const data = await res.json();
                if(!data || !data.movie) return;

                const movie = data.movie;
                let infoHtml = `
                    <div class="detail-header">
                        <img src="${movie.thumb_url}" onerror="this.src='https://via.placeholder.com/110x160'">
                        <div class="detail-info">
                            <h3>${movie.name}</h3>
                            <p>🗓️ Năm: ${movie.year}</p>
                            <p>⏱️ Thời lượng: ${movie.time || 'Đang cập nhật'}</p>
                        </div>
                    </div>
                    <p style="font-size: 13px; line-height: 1.6; color: #ccc;"><strong>Tóm tắt:</strong> ${movie.content ? movie.content.substring(0, 200) : '...'}...</p>
                    <hr style="border: 0.5px solid #222; margin: 15px 0;">
                `;
                document.getElementById('movie-info-box').innerHTML = infoHtml;

                let epBoxHtml = '<h4 style="color: #e50914;">🍿 DANH SÁCH TẬP:</h4>';
                if (data.episodes && data.episodes.length > 0) {
                    data.episodes.forEach(server => {
                        if(server.server_data && server.server_data.length > 0) {
                            epBoxHtml += `<div class="server-title">🚀 NGUỒN: ${server.server_name.toUpperCase()}</div><div class="episode-list">`;
                            server.server_data.forEach(tap => {
                                if(tap.link_m3u8) {
                                    epBoxHtml += `<button class="episode-btn" onclick="openPlayerView('${tap.link_m3u8}')">${tap.name}</button>`;
                                }
                            });
                            epBoxHtml += `</div>`;
                        }
                    });
                } else {
                    epBoxHtml += '<p>Chưa có tập trực tuyến.</p>';
                }
                document.getElementById('episode-box').innerHTML = epBoxHtml;
                document.getElementById('detail-view').style.display = 'block';
            } catch (e) { alert('Lỗi tải tập phim!'); }
        }

        function openPlayerView(linkVideo) {
            document.getElementById('video-iframe').src = `https://player.phimapi.com/player/?url=${encodeURIComponent(linkVideo)}`;
            document.getElementById('player-view').style.display = 'block';
        }
        function closeDetailView() { document.getElementById('detail-view').style.display = 'none'; }
        function closePlayerView() { document.getElementById('player-view').style.display = 'none'; document.getElementById('video-iframe').src = ''; }
    </script>
</body>
</html>
