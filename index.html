<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rạp Phim Mini App VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* TOÀN BỘ PHONG CÁCH PREMIER NETFLIX */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0b0c;
            color: #f5f5f7;
            margin: 0;
            padding: 16px;
            padding-bottom: 40px;
            -webkit-font-smoothing: antialiased;
        }
        
        h2 { 
            color: #ff0022; 
            text-align: center; 
            margin: 10px 0 20px 0; 
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 34, 0.3);
        }
        
        /* BANNER ĐẾM NGƯỢC VIP CHUYÊN NGHIỆP */
        .vip-countdown-box {
            background: linear-gradient(135deg, #1e1b4b, #311015);
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .vip-countdown-box p { 
            margin: 0; 
            font-size: 11px; 
            color: #f87171; 
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        #countdown-timer { 
            font-size: 15px; 
            color: #ffffff; 
            font-family: system-ui, sans-serif;
            display: block; 
            margin-top: 6px; 
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        /* KHU VỰC TÌM KIẾM */
        .search-box { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 24px; 
        }
        input {
            flex: 1; 
            padding: 14px 20px; 
            border-radius: 30px;
            border: 1px solid #27272a; 
            background-color: #18181b;
            color: white; 
            outline: none; 
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: #ff0022;
            box-shadow: 0 0 0 2px rgba(255, 0, 34, 0.2);
            background-color: #202024;
        }
        .btn {
            padding: 14px 24px; 
            background: linear-gradient(180deg, #ff0022, #c4001a);
            color: white; 
            border: none; 
            border-radius: 30px;
            font-weight: 700; 
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 0, 34, 0.3);
            transition: transform 0.1s ease;
        }
        .btn:active {
            transform: scale(0.96);
        }
        
        /* MÀN HÌNH KHÓA TRUY CẬP TRÔNG XỊN HƠN */
        #lock-screen {
            display: none; 
            position: fixed; 
            top:0; left:0; width:100%; height:100%;
            background:#0b0b0c; 
            z-index: 99999; 
            padding-top: 35%; 
            box-sizing: border-box;
        }
        .lock-card { 
            background: #18181b; 
            padding: 40px 24px; 
            margin: 0 24px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 0, 34, 0.2); 
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }
        
        /* DANH SÁCH PHIM DẠNG LƯỚI HOLLYWOOD */
        .movie-list { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
        }
        .movie-item {
            background-color: #18181b; 
            border-radius: 14px;
            overflow: hidden; 
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            transition: transform 0.2s ease;
        }
        .movie-item:active {
            transform: scale(0.97);
        }
        .movie-poster-wrapper {
            position: relative;
            width: 100%;
            height: 230px;
            background-color: #27272a;
        }
        .movie-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .movie-year-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            color: #ff0022;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }
        .movie-title {
            font-size: 13px; 
            padding: 10px 8px; 
            font-weight: 600;
            line-height: 1.4;
            color: #f4f4f5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 36px;
        }
        
        /* GIAO DIỆN CHI TIẾT PHIM MỚI */
        #detail-view {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #0b0b0c;
            z-index: 5000; 
            overflow-y: auto; 
            padding: 16px; 
            box-sizing: border-box;
        }
        .detail-banner {
            margin-top: 45px;
            background: #18181b;
            border-radius: 20px;
            padding: 16px;
            display: flex;
            gap: 16px;
            border: 1px solid #27272a;
        }
        .detail-banner img { 
            width: 105px; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .detail-info {
            flex: 1;
        }
        .detail-info h3 { 
            margin: 0 0 8px 0; 
            color: #ffffff; 
            font-size: 18px; 
            font-weight: 700;
            line-height: 1.3;
        }
        .detail-info p { 
            font-size: 13px; 
            color: #a1a1aa; 
            margin: 6px 0; 
        }
        .movie-content-text {
            background: #18181b;
            padding: 16px;
            border-radius: 16px;
            margin-top: 16px;
            font-size: 13px;
            line-height: 1.6;
            color: #d4d4d8;
            border: 1px solid #27272a;
        }
        
        .server-title { 
            color: #a1a1aa; 
            font-size: 12px; 
            margin: 20px 0 10px 4px; 
            font-weight: 700; 
            letter-spacing: 1px;
        }
        
        /* DANH SÁCH TẬP PHIM HIỆN ĐẠI */
        .episode-list { 
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px; 
            margin-bottom: 25px; 
        }
        .episode-btn {
            background-color: #18181b; 
            color: #f4f4f5; 
            padding: 12px 5px;
            border-radius: 10px; 
            font-size: 13px; 
            font-weight: 600;
            border: 1px solid #27272a; 
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }
        .episode-btn:active { 
            background: #ff0022; 
            border-color: #ff0022;
            color: white;
        }
        .back-btn { 
            background: #27272a; 
            position: absolute; 
            top: 12px; left: 16px; 
            padding: 8px 16px; 
            font-size: 13px;
            box-shadow: none;
        }

        /* TRÌNH PHÁT PHIM FULL SCREEN */
        #player-view {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000; z-index: 9999;
        }
        .close-player-btn {
            position: absolute; top: 16px; right: 16px;
            background: rgba(39, 39, 42, 0.8); 
            backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 16px; 
            border-radius: 20px;
            font-weight: bold; z-index: 10001; cursor: pointer;
            font-size: 12px;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-card">
            <h3 style="margin-top:0; color:#ff0022; font-size: 20px;">⚠️ TRUY CẬP BỊ TỪ CHỐI</h3>
            <p style="font-size:14px; line-height:1.5;">Tài khoản VIP của bạn chưa kích hoạt hoặc đã hết hạn.</p>
            <p style="color:#a1a1aa; font-size:12px; margin-top:15px;">Vui lòng mua mã Key VIP mới và gửi vào ô chat Bot để kích hoạt lại.</p>
        </div>
    </div>

    <div id="main-view">
        <h2>🎬 PREMIUM CINEMA</h2>
        
        <div class="vip-countdown-box">
            <p>⏱️ Thời gian VIP còn lại</p>
            <span id="countdown-timer">Đang kết nối dữ liệu...</span>
        </div>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="Tìm tên phim, anime, quốc gia...">
            <button class="btn" onclick="searchMovie()">Tìm</button>
        </div>
        
        <div class="movie-list" id="result-list"></div>
    </div>

    <div id="detail-view">
        <button class="btn back-btn" onclick="closeDetailView()">🔙 Trở Về</button>
        <div id="movie-info-box"></div>
        <div id="episode-box"></div>
    </div>

    <div id="player-view">
        <button class="close-player-btn" onclick="closePlayerView()">❌ Đóng Phim</button>
        <iframe id="video-iframe" src="" allowfullscreen></iframe>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const URL_API_SHEET = "LINK_GOOGLE_APPS_SCRIPT_CUA_BAN"; // Dán link của bạn vào đây

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user_id');
            const expireStr = urlParams.get('expire');
            
            // Kiểm tra VIP với Google Sheet trước khi hiển thị
            const response = await fetch(`${URL_API_SHEET}?action=checkUser&user_id=${userId}`);
            const status = await response.text();
            
            if (status !== "active") {
                document.getElementById('lock-screen').style.display = 'block';
                document.getElementById('main-view').style.display = 'none';
            } else {
                khoiChayDemNguoc(decodeURIComponent(expireStr));
            }
                    }
 
checkVipAccess();
        

        function khoiChayDemNguoc(targetDateStr) {
            const parts = targetDateStr.split(" ");
            const dateParts = parts[0].split("/");
            const timeParts = parts[1].split(":");
            const targetDate = new Date(dateParts[2], dateParts[1] - 1, dateParts[0], timeParts[0], timeParts[1], timeParts[2]).getTime();

            const timerInterval = setInterval(function() {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    clearInterval(timerInterval);
                    document.getElementById("countdown-timer").innerHTML = "HẾT HẠN VIP";
                    hienThiManHinhKhoa();
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("countdown-timer").innerHTML = 
                    `${days} ngày, ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function hienThiManHinhKhoa() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'block';
        }

        async function searchMovie() {
            const kw = document.getElementById('keyword').value.trim();
            if(!kw) return;
            document.getElementById('result-list').innerHTML = "<p style='grid-column: span 2; text-align:center; color:#a1a1aa;'>🔍 Kho phim đang tải, xin chờ...</p>";
            try {
                const res = await fetch(`https://phimapi.com/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=40`);
                const data = await res.json();
                let html = '';
                if(data.status === 'success' && data.data.items && data.data.items.length > 0) {
                    data.data.items.forEach(phim => {
                        html += `
                            <div class="movie-item" onclick="loadMovieDetail('${phim.slug}')">
                                <div class="movie-poster-wrapper">
                                    <span class="movie-year-badge">${phim.year}</span>
                                    <img src="https://img.phimapi.com/${phim.thumb_url}" onerror="this.src='https://via.placeholder.com/150x230?text=No+Poster'">
                                </div>
                                <div class="movie-title">${phim.name}</div>
                            </div>
                        `;
                    });
                } else {
                    html = '<p style="grid-column: span 2; text-align:center; color:#a1a1aa;">❌ Không tìm thấy phim phù hợp!</p>';
                }
                document.getElementById('result-list').innerHTML = html;
            } catch (e) {
                document.getElementById('result-list').innerHTML = '<p style="grid-column: span 2; text-align:center; color:#ff0022;">⚠️ Lỗi kết nối API kho phim.</p>';
            }
        }

        async function loadMovieDetail(slug) {
            try {
                const res = await fetch(`https://phimapi.com/phim/${slug}`);
                const data = await res.json();
                if(!data || !data.movie) return;

                const movie = data.movie;
                let infoHtml = `
                    <div class="detail-banner">
                        <img src="${movie.thumb_url}" onerror="this.src='https://via.placeholder.com/110x160'">
                        <div class="detail-info">
                            <h3>${movie.name}</h3>
                            <p>🗓️ Năm phát hành: <span style="color:white; font-weight:600;">${movie.year}</span></p>
                            <p>⏱️ Thời lượng: <span style="color:white; font-weight:600;">${movie.time || 'N/A'}</span></p>
                            <p>🌍 Quốc gia: <span style="color:white; font-weight:600;">${movie.country && movie.country[0] ? movie.country[0].name : 'N/A'}</span></p>
                        </div>
                    </div>
                    <div class="movie-content-text"><strong>Nội dung:</strong> ${movie.content ? movie.content : 'Đang cập nhật nội dung...'}</div>
                `;
                document.getElementById('movie-info-box').innerHTML = infoHtml;

                let epBoxHtml = '';
                if (data.episodes && data.episodes.length > 0) {
                    data.episodes.forEach(server => {
                        if(server.server_data && server.server_data.length > 0) {
                            epBoxHtml += `<div class="server-title">CHỌN TẬP PHIM (${server.server_name.toUpperCase()})</div><div class="episode-list">`;
                            server.server_data.forEach(tap => {
                                if(tap.link_m3u8) {
                                    epBoxHtml += `<button class="episode-btn" onclick="openPlayerView('${tap.link_m3u8}')">${tap.name}</button>`;
                                }
                            });
                            epBoxHtml += `</div>`;
                        }
                    });
                } else {
                    epBoxHtml += '<p style="text-align:center; color:#a1a1aa;">Phim chưa cập nhật tập trực tuyến.</p>';
                }
                document.getElementById('episode-box').innerHTML = epBoxHtml;
                document.getElementById('detail-view').style.display = 'block';
            } catch (e) { alert('Lỗi hệ thống tải phim!'); }
        }

        function openPlayerView(linkVideo) {
            document.getElementById('video-iframe').src = `https://player.phimapi.com/player/?url=${encodeURIComponent(linkVideo)}`;
            document.getElementById('player-view').style.display = 'block';
        }
        function closeDetailView() { document.getElementById('detail-view').style.display = 'none'; }
        function closePlayerView() { document.getElementById('player-view').style.display = 'none'; document.getElementById('video-iframe').src = ''; }
    </script>
</body>
</html>
