<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phim VIP Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Reset cài đặt hệ thống để ép tràn màn hình */
        * { 
            box-sizing: border-box; 
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Nền đen chuẩn rạp phim */
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Triệt tiêu thanh cuộn dọc cuộn ngang */
        }

        /* Khung bao bọc toàn bộ ứng dụng */
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Thanh trạng thái hiển thị tên tập phim */
        #status-bar {
            padding: 12px 15px;
            background: #111111;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 1px solid #222222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Tự thu gọn nếu tên phim quá dài */
        }

        /* Khung chứa trình phát chiếm trọn không gian còn lại */
        #player-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ép Iframe Player co giãn chuẩn 100% tràn viền */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Giao diện hiển thị khi không có phim hoặc lỗi link */
        .error-box {
            text-align: center;
            padding: 30px;
        }

        .error-box h3 {
            color: #ff4d4d;
            margin-bottom: 10px;
        }

        .error-box p {
            color: #aaaaaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="status-bar">🎬 Đang tải trình phát phim...</div>
    
    <div id="player-wrapper">
        <iframe 
            id="video-player"
            src="" 
            allow="autoplay; fullscreen; picture-in-picture" 
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true">
        </iframe>
    </div>
</div>

<script>
    // 1. Khởi tạo kết nối với ứng dụng Telegram Telegram
    const tg = window.Telegram.WebApp;
    
    // Ép Mini App bung hết cỡ lên sát mép màn hình ngay khi vừa mở
    tg.expand(); 
    tg.ready();

    // 2. Trích xuất và giải mã các tham số truyền từ Bot sang ứng dụng (URL & Name)
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('url'); 
    const movieName = urlParams.get('name');

    const player = document.getElementById('video-player');
    const statusBar = document.getElementById('status-bar');

    // 3. Kiểm tra tính hợp lệ của đường link phim
    if (videoUrl) {
        // Giải mã hóa thực thể URL (Decode) để đưa link nhúng m3u8 về dạng nguyên bản
        const decodedUrl = decodeURIComponent(videoUrl);
        player.src = decodedUrl;
        
        // Cập nhật tên bộ phim đang xem lên thanh tiêu đề Mini App
        if (movieName) {
            statusBar.innerText = `🍿 Đang phát: ${decodeURIComponent(movieName)}`;
        } else {
            statusBar.innerText = "🍿 Đang phát phim";
        }
    } else {
        // Hiển thị màn hình báo lỗi nếu người dùng cố tình truy cập link web trực tiếp không qua Bot
        document.getElementById('player-wrapper').innerHTML = `
            <div class="error-box">
                <h3>⚠️ Không Tìm Thấy Dữ Liệu Phim</h3>
                <p>Vui lòng quay lại Bot Telegram, chọn bộ phim và bấm vào tập phim để xem.</p>
            </div>
        `;
        statusBar.innerText = "❌ Lỗi kết nối dữ liệu";
    }

    // 4. Cơ chế tự động ép giữ màn hình luôn mở rộng tối đa (Tránh lỗi co giật màn hình trên Android)
    tg.onEvent('viewportChanged', function() {
        if (!tg.isExpanded) {
            tg.expand();
        }
    });
</script>

</body>
</html>
