<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ thống phim VIP Bảo Mật Cao</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0d0d0d; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #main-dashboard, #player-view { padding: 20px; display: none; }
        .vip-card {
            background: linear-gradient(135deg, #e67e22, #f39c12);
            border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 20px;
        }
        .vip-countdown { font-size: 20px; font-weight: bold; font-family: monospace; }
        iframe { width: 100%; height: 250px; border: none; background: #000; }
        
        /* MÀN HÌNH KHÓA THIẾT BỊ LẠ */
        #secure-lock {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999; justify-content: center; align-items: center;
            flex-direction: column; text-align: center; padding: 20px;
        }
        .lock-card { background: #111; padding: 30px; border-radius: 12px; border: 2px solid #ff4d4d; max-width: 90%; }
    </style>
</head>
<body>

<div id="secure-lock">
    <div class="lock-card">
        <h2 id="lock-title" style="color: #f39c12;">🔄 ĐANG XÁC THỰC THIẾT BỊ...</h2>
        <p id="lock-desc" style="color: #aaa; font-size: 14px;">Hệ thống đang kiểm tra chữ ký an toàn và địa chỉ IP mạng mạng của bạn.</p>
    </div>
</div>

<div id="main-dashboard">
    <div class="vip-card">
        <div>👑 THỜI GIAN VIP CÒN LẠI</div>
        <div id="countdown-text" class="vip-countdown">--:--:--</div>
    </div>
    <p style="text-align: center; color: #888;">Hệ thống bảo mật IP đã được kích hoạt thành công.</p>
</div>

<div id="player-view">
    <h3 id="movie-title-text" style="margin-top: 0; color: #f39c12;">Loading...</h3>
    <iframe id="video-player" allowfullscreen></iframe>
</div>

<script>
    const SECRET_KEY = "PHIMAPI_VIP_SECURE_TOKEN_KEY_2026"; // Trùng khớp với Bot
    
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');
    const expireTimeStr = urlParams.get('expire');
    const paramIp = urlParams.get('ip');
    const paramToken = urlParams.get('token');
    const directVideoUrl = urlParams.get('url');
    const directMovieName = urlParams.get('name');
    const viewMode = urlParams.get('mode');

    // Bước 1: Kiểm tra tính hợp lệ của chữ ký cục bộ (Chống tự sửa link/ngày tháng)
    function checkTokenIntegrity(currentIp) {
        if (!userId || !expireTimeStr || !paramToken) return false;
        const cleanExpire = decodeURIComponent(expireTimeStr);
        
        // Tạo chuỗi MD5 giả lập giống hệt cách Bot tạo
        const stringToHash = `${userId}|${cleanExpire}|${currentIp}|${SECRET_KEY}`;
        const calculatedToken = CryptoJS.MD5(stringToHash).toString();
        
        return calculatedToken === paramToken;
    }

    // Bước 2: Gọi API lấy IP mạng thực tế hiện tại của máy đang mở link
    fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => {
            const realIp = data.ip;
            
            // Thực hiện kiểm tra chéo IP truyền trên link và chữ ký mã hóa
            if (paramIp === realIp && checkTokenIntegrity(realIp)) {
                // Kiểm tra hạn thời gian tiếp theo
                const cleanStr = decodeURIComponent(expireTimeStr);
                const [datePart, timePart] = cleanStr.split(' ');
                const [day, month, year] = datePart.split('/');
                const [hour, minute, second] = timePart.split(':');
                const expireDate = new Date(year, month - 1, day, hour, minute, second);
                
                if ((expireDate - new Date()) <= 0) {
                    showLockScreen("🔒 TRUY CẬP HẾT HẠN", "Gói VIP đính kèm link này đã hết thời gian hiệu lực.");
                    return;
                }

                // Hợp lệ hoàn toàn -> Mở khóa giao diện
                document.getElementById('secure-lock').style.display = 'none';
                
                if (directVideoUrl) {
                    document.getElementById('player-view').style.display = 'block';
                    document.getElementById('video-player').src = decodeURIComponent(directVideoUrl);
                    document.getElementById('movie-title-text').innerText = directMovieName ? decodeURIComponent(directMovieName) : "Đang xem ngoài";
                } else {
                    document.getElementById('main-dashboard').style.display = 'block';
                }
            } else {
                // IP không trùng hoặc link bị sửa
                showLockScreen("🔒 PHÁT HIỆN GIAN LẬN IP", "Link này đã được chia sẻ lậu hoặc bị chỉnh sửa trái phép. Hệ thống đã khóa thiết bị của bạn.");
            }
        })
        .catch(() => {
            showLockScreen("🔒 LỖI XÁC THỰC", "Không thể kết nối tới máy chủ kiểm định IP an toàn.");
        });

    function showLockScreen(title, desc) {
        document.getElementById('secure-lock').style.display = 'flex';
        document.getElementById('lock-title').innerText = title;
        document.getElementById('lock-title').style.color = '#ff4d4d';
        document.getElementById('lock-desc').innerText = desc;
    }
</script>
</body>
</html>
