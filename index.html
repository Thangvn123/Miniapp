<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinema Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            padding-bottom: 75px; 
            overflow-x: hidden;
            -webkit-user-select: none;
        }

        /* HEADER & FILTERS */
        .header-top {
            padding: 15px 16px;
            font-size: 20px;
            font-weight: bold;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 0 16px 15px 16px;
            overflow-x: auto;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .f-pill {
            background: #222;
            border: 1px solid #333;
            color: #fff;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
        }

        /* HERO BANNER */
        .hero {
            position: relative;
            width: 92%;
            height: 450px;
            margin: 0 auto 20px auto;
            border-radius: 15px;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, #000, transparent);
        }
        .hero-info {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
        }
        .hero-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        .btn-p { background: #fff; color: #000; border: none; padding: 10px 30px; border-radius: 5px; font-weight: bold; width: 140px; }
        .btn-s { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; width: 140px; }

        /* MOVIE LISTS */
        .row-title { margin: 20px 16px 10px; font-size: 17px; font-weight: bold; }
        .scroll-row { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px; }
        .scroll-row::-webkit-scrollbar { display: none; }
        .card-v { min-width: 110px; border-radius: 8px; overflow: hidden; }
        .card-v img { width: 110px; height: 160px; object-fit: cover; }

        /* BOTTOM NAVIGATION - THEO ẢNH MẪU */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 65px;
            background: #111;
            border-top: 1px solid #222;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #888;
            font-size: 10px;
            text-decoration: none;
        }
        .nav-item.active { color: #fff; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }

        /* SECURITY LOCK */
        #lock-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
            padding: 20px;
        }

        /* ACCOUNT & SEARCH PAGES */
        .page-content { display: none; padding: 20px; }
        .active-page { display: block; }
        .vip-box {
            background: linear-gradient(145deg, #1a1a1a, #000);
            border: 1px solid #e50914;
            padding: 30px;
            border-radius: 15px;
            margin-top: 50px;
        }
        #timer { font-size: 24px; font-weight: bold; color: #e50914; margin: 15px 0; display: block; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <h2 style="color: #e50914;">TRUY CẬP KHÔNG HỢP LỆ</h2>
        <p>Ứng dụng này chỉ khả dụng trên Telegram Mini App.</p>
    </div>

    <div id="app-body">
        <!-- HOME PAGE -->
        <div id="page-home" class="page-content active-page" style="padding:0">
            <div class="header-top">Kho Phim VIP</div>
            <div class="filter-bar">
                <div class="f-pill">Phim Bộ</div>
                <div class="f-pill">Phim Lẻ</div>
                <div class="f-pill">Hoạt Hình</div>
                <div class="f-pill">Hành Động</div>
            </div>
            
            <div class="hero" style="background-image: url('https://img.phimapi.com/upload/poster/bac-si-xu-la.jpg');">
                <div class="hero-info">
                    <h2 id="h-title">Bác Sĩ Xứ Lạ</h2>
                    <div class="hero-btns">
                        <button class="btn-p">▶ Phát</button>
                        <button class="btn-s">+ Danh sách</button>
                    </div>
                </div>
            </div>

            <p class="row-title">Phim mới cập nhật</p>
            <div class="scroll-row" id="list-new"></div>
        </div>

        <!-- SEARCH PAGE -->
        <div id="page-search" class="page-content">
            <h3>Tìm kiếm</h3>
            <input type="text" placeholder="Tên phim..." style="width:100%; padding:12px; border-radius:8px; border:none; background:#222; color:#fff;">
            <div id="search-results" style="margin-top:20px;"></div>
        </div>

        <!-- ACCOUNT PAGE -->
        <div id="page-account" class="page-content">
            <div class="vip-box">
                <p>THỜI GIAN VIP CÒN LẠI</p>
                <span id="timer">00:00:00</span>
                <p style="font-size:12px; color:#888;" id="u-id">ID: Loading...</p>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div class="bottom-nav">
            <div class="nav-item active" onclick="showTab('home', this)">
                <span class="nav-icon">🏠</span>
                <span>Trang chủ</span>
            </div>
            <div class="nav-item" onclick="showTab('search', this)">
                <span class="nav-icon">🔍</span>
                <span>Tìm kiếm</span>
            </div>
            <div class="nav-item" onclick="showTab('account', this)">
                <span class="nav-icon">👤</span>
                <span>Tài khoản</span>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        // KIỂM TRA BẢO MẬT: CHẶN TRÌNH DUYỆT NGOÀI
        if (!tg.initData || tg.platform === 'unknown') {
            document.getElementById('lock-overlay').style.display = 'flex';
            document.getElementById('app-body').style.display = 'none';
        } else {
            tg.expand();
            initApp();
        }

        function showTab(name, el) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active-page');
            el.classList.add('active');
        }

        function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('u-id').innerText = "ID: " + (urlParams.get('user_id') || "Guest");
            
            // Giả lập đếm ngược VIP
            let timeLeft = 3600 * 24; 
            setInterval(() => {
                timeLeft--;
                let h = Math.floor(timeLeft / 3600);
                let m = Math.floor((timeLeft % 3600) / 60);
                let s = timeLeft % 60;
                document.getElementById('timer').innerText = `${h}h ${m}m ${s}s`;
            }, 1000);

            // Load phim mẫu
            fetch('https://phimapi.com/danh-sach/phim-moi-cap-nhat?page=1')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.items.slice(0, 10).forEach(i => {
                        html += `<div class="card-v"><img src="${i.thumb_url}"><div style="font-size:11px; margin-top:5px;">${i.name}</div></div>`;
                    });
                    document.getElementById('list-new').innerHTML = html;
                });
        }
    </script>
</body>
</html>
