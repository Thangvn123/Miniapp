<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0b0b0c; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #ff0022; width: 300px; }
        #key { font-size: 28px; color: #ff0022; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box" id="app"><h2>Đang kiểm tra...</h2></div>
    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
            document.getElementById('app').innerHTML = "<h1>❌ Truy cập trái phép!</h1>";
        } else {
            // Tự hủy trang sau 5 phút (300,000ms)
            setTimeout(() => { document.body.innerHTML = "<h1>⚠️ Link đã hết hạn!</h1>"; }, 300000);
            
            fetch('https://script.google.com/macros/s/AKfycbyKoGbeLI3sX5MHd9RgEGabv6oLx3v524zHiUU9uKmewgWDPtY2z8l7B7-TFUxhPh7L/exec?token=' + token)
            .then(r => r.text()).then(k => {
                document.getElementById('app').innerHTML = `<h3>MÃ CỦA BẠN</h3><div id="key">${k}</div><button onclick="navigator.clipboard.writeText('${k}'); alert('Đã copy!');">COPY MÃ</button>`;
            });
        }
    </script>
</body>
</html>
